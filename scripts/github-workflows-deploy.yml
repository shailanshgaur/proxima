---

# Setup Instructions:
#
# 1. Create GitHub Actions workflow file:
#    $ mkdir -p .github/workflows
#    $ cp scripts/github-workflows-deploy.yml .github/workflows/deploy.yml
#
# 2. Set required secrets in GitHub:
#    - VERCEL_TOKEN: Get from https://vercel.com/account/tokens
#    - VERCEL_ORG_ID: From Vercel dashboard
#    - VERCEL_PROJECT_ID: From Vercel project settings
#
#    Steps:
#    a) Go to repo Settings → Secrets and variables → Actions
#    b) Click "New repository secret"
#    c) Add VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
#
# 3. Commit and push:
#    $ git add .github/workflows/deploy.yml
#    $ git commit -m "Add GitHub Actions deployment workflow"
#    $ git push origin main
#
# 4. Verify:
#    - Go to Actions tab in GitHub
#    - Watch workflow run on next push to main
#    - Check Vercel dashboard for deployment

---

# Environment Setup:
#
# The workflow needs access to Vercel. Set these secrets:
#
# VERCEL_TOKEN:
#   - Go to: https://vercel.com/account/tokens
#   - Create new token (full scope)
#   - Copy and paste in GitHub Secrets
#
# VERCEL_ORG_ID:
#   - Go to: https://vercel.com/account/settings
#   - Look for "Organization ID" or "Team ID"
#   - Copy value
#
# VERCEL_PROJECT_ID:
#   - Go to: https://vercel.com/dashboard
#   - Select project (zing-connect)
#   - Settings → General
#   - Look for "Project ID"
#   - Copy value

---

