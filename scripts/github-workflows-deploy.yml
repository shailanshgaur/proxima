# GitHub Actions Workflow Template for Deployment
# Copy this to: .github/workflows/deploy.yml
#
# This workflow can optionally use the deploy.sh script for consistency
# between local and CI/CD deployments
#
# Trigger: Push to main branch
# Action: Build, test, and deploy to Vercel

name: Deploy to Vercel

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:  # Allow manual trigger

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git operations

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci
        env:
          CI: true

      # 4. TypeScript check
      - name: TypeScript type check
        run: npm exec tsc --noEmit

      # 5. Build
      - name: Build application
        run: npm run build
        env:
          CI: true

      # 6. Upload build artifact (optional)
      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

      # 7. Deploy to Vercel
      - name: Deploy to Vercel
        uses: vercel/action@main
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./
          production: true

      # 8. Smoke test (optional)
      - name: Smoke test - Health check
        run: |
          echo "Waiting for deployment to complete..."
          sleep 30

          APP_URL="https://zing-connect.vercel.app"
          MAX_RETRIES=5
          RETRY_INTERVAL=5

          for i in $(seq 1 $MAX_RETRIES); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$APP_URL")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✓ Health check passed (HTTP $HTTP_CODE)"
              exit 0
            fi
            echo "Attempt $i/$MAX_RETRIES: HTTP $HTTP_CODE - retrying in ${RETRY_INTERVAL}s..."
            if [ $i -lt $MAX_RETRIES ]; then
              sleep $RETRY_INTERVAL
            fi
          done

          echo "✗ Health check failed after $MAX_RETRIES attempts"
          exit 1

      # 9. Post deployment summary
      - name: Deployment summary
        if: success()
        run: |
          echo "## Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** https://zing-connect.vercel.app" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date)" >> $GITHUB_STEP_SUMMARY

      # 10. Error notification (optional)
      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Deployment failed. Check [workflow logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}).'
            })

