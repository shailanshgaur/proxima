name: Pre-Launch Tests

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC

jobs:
  pre-launch-tests:
    name: Pre-Launch Test Suite
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Run type check
        run: npx tsc --noEmit

      - name: Check environment variables
        run: |
          if [ -z "$SUPABASE_URL" ]; then
            echo "ERROR: SUPABASE_URL not set"
            exit 1
          fi
          if [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "ERROR: SUPABASE_ANON_KEY not set"
            exit 1
          fi
          echo "Environment variables verified"

      - name: Run Pre-Launch Tests
        run: bash scripts/pre-launch-tests.sh
        timeout-minutes: 5

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-logs-node-${{ matrix.node-version }}
          path: /tmp/proxima_test_*.log
          retention-days: 30

      - name: Comment test results on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const logs = require('glob').sync('/tmp/proxima_test_*.log');

            if (logs.length > 0) {
              const logContent = fs.readFileSync(logs[0], 'utf8');
              const lastLines = logContent.split('\n').slice(-50).join('\n');

              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## Pre-Launch Test Results\n\n\`\`\`\n${lastLines}\n\`\`\``
              });
            }

      - name: Set job status
        if: failure()
        run: exit 1

  database-checks:
    name: Database Health Checks
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check database connectivity
        run: |
          curl -f -s -X GET "${SUPABASE_URL}/rest/v1/" \
            -H "apikey: ${SUPABASE_ANON_KEY}" > /dev/null
          echo "Database connectivity: OK"

      - name: Check Auth service
        run: |
          response=$(curl -s -X POST "${SUPABASE_URL}/auth/v1/otp" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"phone":"+919876543210"}' -w "\n%{http_code}" | tail -1)

          if [ "$response" = "200" ] || [ "$response" = "422" ]; then
            echo "Auth service connectivity: OK"
          else
            echo "Auth service connectivity: FAILED (HTTP $response)"
            exit 1
          fi

  security-checks:
    name: Security Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for secrets in code
        run: |
          if grep -r "SUPABASE_ANON_KEY\|SUPABASE_SERVICE_KEY" src/ \
            --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" \
            | grep -v "import.meta.env" | grep -v "process.env"; then
            echo "ERROR: Potential secrets found in code"
            exit 1
          fi
          echo "Secret check: OK"

      - name: Verify no hardcoded URLs
        run: |
          if grep -r "https://.*\.supabase\.co" src/ \
            --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" \
            | grep -v "import.meta.env"; then
            echo "ERROR: Hardcoded Supabase URLs found"
            exit 1
          fi
          echo "URL check: OK"

  performance-baseline:
    name: Performance Baseline
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build for production
        run: |
          npm ci --legacy-peer-deps
          npm run build

      - name: Calculate bundle size
        run: |
          dist_size=$(du -sh dist/ | awk '{print $1}')
          echo "Build artifact size: $dist_size"

      - name: Check build size
        run: |
          max_size_mb=500
          actual_size=$(du -sk dist/ | awk '{print $1}')
          actual_size_mb=$((actual_size / 1024))

          if [ "$actual_size_mb" -gt "$max_size_mb" ]; then
            echo "ERROR: Build size ${actual_size_mb}MB exceeds limit ${max_size_mb}MB"
            exit 1
          fi
          echo "Build size check: OK (${actual_size_mb}MB)"

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [pre-launch-tests, database-checks, security-checks, performance-baseline]
    if: always()

    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.pre-launch-tests.result }}" == "failure" ]; then
            echo "Pre-Launch Tests: FAILED"
            exit 1
          fi

          if [ "${{ needs.database-checks.result }}" == "failure" ]; then
            echo "Database Checks: FAILED"
            exit 1
          fi

          if [ "${{ needs.security-checks.result }}" == "failure" ]; then
            echo "Security Checks: FAILED"
            exit 1
          fi

          if [ "${{ needs.performance-baseline.result }}" == "failure" ]; then
            echo "Performance Baseline: FAILED"
            exit 1
          fi

          echo "All checks passed!"

      - name: Notify on success
        if: success()
        run: echo "Pre-launch validation complete - ready to merge"

      - name: Notify on failure
        if: failure()
        run: |
          echo "Pre-launch validation failed"
          echo "Review logs and fix issues before merging"
          exit 1
